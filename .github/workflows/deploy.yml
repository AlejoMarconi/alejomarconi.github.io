name: Deploy to GitHub Pages

# Builds the React app and publishes the output to GitHub Pages.
# Repo settings -> Pages -> Source must be set to "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent deploys; never cancel an in-progress one because Pages
# treats the artifact as the source of truth.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # `npm install --legacy-peer-deps` (rather than npm ci) tolerates the
        # peer-dep conflicts that React 18 + MUI 5 + react-scripts 5 produce
        # under modern npm. Treat warnings as warnings.
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          CI: "false"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
